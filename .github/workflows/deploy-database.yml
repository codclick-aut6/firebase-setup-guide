name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Linkar e Executar Migrações
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} -p "${{ secrets.SUPABASE_ID_PASSWORD }}"
          npx supabase db push -p "${{ secrets.SUPABASE_ID_PASSWORD }}"
